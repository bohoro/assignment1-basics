<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS336 — Master Flashcard Deck</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 1.35rem; font-weight: 700; color: #7dd3fc; }
    .header p  { font-size: 0.8rem; color: #475569; margin-top: 4px; }

    /* ── Lecture filter tabs ── */
    .lecture-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      width: min(680px, 100%);
      margin-bottom: 22px;
    }
    .lec-btn {
      padding: 5px 14px; border-radius: 99px; font-size: 0.78rem; font-weight: 600;
      border: 1px solid #334155; background: #1e293b; color: #64748b; cursor: pointer;
      transition: all 0.15s;
    }
    .lec-btn.active, .lec-btn:hover { background: #2563eb; border-color: #3b82f6; color: #fff; }
    .lec-btn.locked { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Stats row ── */
    .stats {
      display: flex; gap: 20px; margin-bottom: 20px;
      font-size: 0.78rem; color: #64748b;
    }
    .stat span { color: #94a3b8; font-weight: 600; }

    /* ── Card flip ── */
    .scene {
      width: min(580px, 100%); height: 310px;
      perspective: 900px; cursor: pointer; user-select: none;
    }
    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .card.flipped { transform: rotateY(180deg); }
    .face {
      position: absolute; inset: 0; border-radius: 18px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 28px; text-align: center;
    }
    .front {
      background: linear-gradient(135deg, #1e3a5f 0%, #1e293b 100%);
      border: 1px solid #2563eb33;
      box-shadow: 0 8px 32px #0006;
    }
    .back {
      background: linear-gradient(135deg, #1a3a2a 0%, #1e293b 100%);
      border: 1px solid #16a34a33;
      box-shadow: 0 8px 32px #0006;
      transform: rotateY(180deg);
    }
    .tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 3px 10px;
      border-radius: 99px; margin-bottom: 14px;
    }
    .lec-label {
      font-size: 0.68rem; color: #475569; margin-bottom: 6px; letter-spacing: 0.05em;
    }
    .front .tag { background: #1d4ed8; color: #bfdbfe; }
    .back  .tag { background: #166534; color: #bbf7d0; }
    .question { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; line-height: 1.5; }
    .answer   { font-size: 0.92rem; color: #d1fae5; line-height: 1.65; }
    .hint { margin-top: 18px; font-size: 0.7rem; color: #334155; }

    /* ── Controls ── */
    .controls { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
    button {
      background: #1e293b; border: 1px solid #334155; color: #cbd5e1;
      padding: 9px 20px; border-radius: 10px; font-size: 0.88rem;
      cursor: pointer; transition: all 0.15s;
    }
    button:hover:not(:disabled) { background: #334155; color: #f1f5f9; }
    button:disabled { opacity: 0.3; cursor: default; }
    .btn-flip { background: #1d4ed8; border-color: #2563eb; color: #fff; font-weight: 600; }
    .btn-flip:hover { background: #2563eb !important; }

    /* ── Progress bar ── */
    .bar-wrap {
      width: min(580px, 100%); height: 4px;
      background: #1e293b; border-radius: 99px;
      margin-top: 18px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      transition: width 0.35s ease;
    }
    .progress-label { font-size: 0.78rem; color: #475569; margin-top: 8px; }

    /* ── Bottom row ── */
    .bottom-row { display: flex; gap: 10px; margin-top: 14px; }
    .sm-btn {
      background: transparent; border: 1px solid #1e293b;
      color: #475569; font-size: 0.75rem; padding: 5px 12px;
    }
    .sm-btn:hover { color: #94a3b8 !important; background: #1e293b !important; }

    /* ── Lecture progress grid ── */
    .lec-grid {
      width: min(580px, 100%); margin-top: 32px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px;
    }
    .lec-card {
      background: #1e293b; border: 1px solid #1e293b;
      border-radius: 12px; padding: 10px 14px; font-size: 0.78rem;
    }
    .lec-card.done { border-color: #166534; }
    .lec-card .lc-num { color: #475569; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; }
    .lec-card .lc-title { color: #94a3b8; font-size: 0.82rem; margin-top: 3px; font-weight: 600; }
    .lec-card.done .lc-title { color: #4ade80; }
    .lec-card .lc-count { color: #334155; font-size: 0.72rem; margin-top: 4px; }
    .lec-card.done .lc-count { color: #166534; }

    /* ── Supporting Materials ── */
    .materials-section {
      width: min(580px, 100%); margin-top: 36px;
    }
    .materials-section h2 {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #475569; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid #1e293b;
    }
    .mat-group { margin-bottom: 18px; }
    .mat-group-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #334155; margin-bottom: 8px;
    }
    .mat-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: #1e293b; border: 1px solid #1e293b;
      border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
      text-decoration: none; transition: border-color 0.15s;
    }
    .mat-item:hover { border-color: #2563eb; }
    .mat-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .mat-body { display: flex; flex-direction: column; gap: 2px; }
    .mat-title { font-size: 0.85rem; font-weight: 600; color: #cbd5e1; }
    .mat-item:hover .mat-title { color: #7dd3fc; }
    .mat-desc { font-size: 0.75rem; color: #475569; line-height: 1.4; }
    .mat-lec-tag {
      font-size: 0.65rem; font-weight: 600; color: #1d4ed8;
      background: #1e3a5f; padding: 1px 7px; border-radius: 99px;
      align-self: flex-start; margin-top: 3px; white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>CS336 · Language Models From Scratch</h1>
  <p>Master Flashcard Deck · Spring 2026</p>
</div>

<!-- Lecture filter -->
<div class="lecture-bar" id="lecture-bar"></div>

<!-- Stats -->
<div class="stats">
  <div>Showing <span id="stat-showing">0</span> cards</div>
  <div>Total <span id="stat-total">0</span> cards</div>
  <div>Lectures unlocked: <span id="stat-lecs">0</span> / 17</div>
</div>

<!-- Card -->
<div class="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face front">
      <span class="tag">Question</span>
      <div class="lec-label" id="card-lec-label"></div>
      <p class="question" id="question-text"></p>
      <p class="hint">Click to reveal · Space/Enter to flip · ← → to navigate</p>
    </div>
    <div class="face back">
      <span class="tag">Answer</span>
      <p class="answer" id="answer-text"></p>
    </div>
  </div>
</div>

<div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
<div class="progress-label" id="progress-label">–</div>

<div class="controls">
  <button id="btn-prev" onclick="navigate(-1)" disabled>← Prev</button>
  <button class="btn-flip" onclick="flipCard()">Flip</button>
  <button id="btn-next" onclick="navigate(1)">Next →</button>
</div>

<div class="bottom-row">
  <button class="sm-btn" onclick="shuffle()">🔀 Shuffle</button>
  <button class="sm-btn" onclick="resetOrder()">↺ Reset order</button>
</div>

<!-- Lecture progress grid -->
<div class="lec-grid" id="lec-grid"></div>

<!-- Supporting Materials -->
<div class="materials-section">
  <h2>Supporting Materials</h2>
  <div id="materials-body"></div>
</div>

const LECTURES = [
  {
    id: 1,
    title: "Intro & Landscape",
    cards: [
      {
        topic: "Tokenization",
        q: "What is a tokenizer, and what two procedures must it implement?",
        a: "A tokenizer converts between raw text (strings) and sequences of integer tokens. It must implement:\n• encode(string) → list of integers\n• decode(list of integers) → string\nThe encode/decode pair must round-trip correctly."
      },
      {
        topic: "Tokenization",
        q: "What is Byte Pair Encoding (BPE), and why is it preferred over character, byte, or word tokenizers?",
        a: "BPE starts with each byte as a token, then iteratively merges the most frequent adjacent pair into a new token. It balances:\n• Small, fixed vocabulary (unlike word tokenizers)\n• Good compression ratio (unlike byte tokenizers)\n• Handles rare/unknown words gracefully\nUsed by GPT-2 onward."
      },
      {
        topic: "Architecture",
        q: "What is the starting-point architecture for language models in CS336, and what are the three key training balance points?",
        a: "Starting point: the Transformer (Vaswani+ 2017).\n\nThe three balance points for any design decision:\n1. Expressivity — can the model represent complex patterns?\n2. Stability — keep parameter & gradient norms in the goldilocks zone\n3. Efficiency — fast on hardware, both training and inference"
      },
      {
        topic: "Scaling & Efficiency",
        q: "What is 'the bitter lesson' as interpreted in this course, and what core formula captures it?",
        a: "Right interpretation: algorithms that scale are what matter.\n\nCore formula:\n  accuracy = efficiency × resources\n\nAt large scale, efficiency matters most — you can't afford waste. Goal: maximize efficiency given a fixed compute and data budget."
      },
      {
        topic: "Scaling Laws",
        q: "What is a scaling recipe, and what is the Chinchilla compute-optimal finding?",
        a: "A scaling recipe maps FLOPs → hyperparameters. Run small experiments, fit a scaling law, extrapolate to full scale.\n\nChinchilla (Hoffmann+ 2022): given compute budget C = 6ND, the optimal ratio is D ≈ 20N.\nExample: 70B model → train on ~1.4T tokens.\n(Caveat: ignores inference cost, which favors smaller models.)"
      },
      {
        topic: "Systems",
        q: "What are the two phases of LLM inference, and why is decoding the bottleneck?",
        a: "• Prefill — all prompt tokens processed in parallel (compute-bound)\n• Decode — one token generated at a time using KV-Cache (memory-bound)\n\nDecoding is the bottleneck: model weights must be loaded from memory for every token. Speedups: quantization, speculative decoding, fused kernels, continuous batching."
      },
      {
        topic: "Data",
        q: "What are the three types of LM training data and the four key data processing steps?",
        a: "Three data types:\n• Pretraining data — large, diverse\n• Mid-training data — high quality, long-context\n• Post-training data — conversations, agentic traces\n\nFour processing steps:\n1. Transformation (HTML/PDF → text)\n2. Filtering (quality/safety classifiers)\n3. Deduplication (MinHash, Bloom filters)\n4. Mixing (weighting each source)"
      },
      {
        topic: "Training",
        q: "What are the key components of the LM training setup covered in CS336?",
        a: "Seven main components:\n1. Loss function — cross-entropy (next-token prediction); multi-token prediction is a variant\n2. Optimizer — AdamW is standard; newer alternatives: SOAP, Muon\n3. Initialization — Xavier init or μP (maximal update parameterization) for stable scaling\n4. Learning rate schedule — cosine decay or WSD (warmup–stable–decay)\n5. Regularization — dropout, weight decay\n6. Batch size — critical batch size balances gradient noise vs. compute efficiency\n7. MoE-specific — load balancing (e.g., aux-free) to prevent expert collapse"
      },
      {
        topic: "Training",
        q: "What is the WSD learning rate schedule, and how does it differ from cosine decay?",
        a: "WSD (Warmup–Stable–Decay) is a three-phase learning rate schedule:\n• Warmup — LR ramps up from 0 to peak over a short period\n• Stable — LR holds at peak for the bulk of training\n• Decay — LR drops sharply at the end\n\nVs. cosine decay: cosine continuously decays after warmup, making it hard to extend training runs. WSD keeps LR high longer (better for throughput) and makes it easier to extend training by simply prolonging the stable phase before decaying."
      },
      {
        topic: "Training",
        q: "What is the critical batch size, and why does it matter for training efficiency?",
        a: "The critical batch size B* is the batch size at which you get roughly the same loss improvement per FLOP as with an infinitely large batch.\n\n• Below B*: bigger batches speed up training with little gradient noise penalty — use larger batches\n• Above B*: adding more samples gives diminishing returns (gradient estimates are already accurate enough)\n\nPractical implication: set batch size ≈ B* to maximize hardware utilization without wasting compute on redundant gradient estimates. B* depends on the dataset and model."
      },
      {
        topic: "Evaluation",
        q: "What is perplexity, and how is it used to evaluate language models?",
        a: "Perplexity (PPL) measures how well a language model predicts a sequence of text. It is the exponentiated average negative log-likelihood per token:\n\n  PPL = exp(cross-entropy loss)\n\nLower perplexity = better prediction = the model is less 'surprised' by the text.\n\nKey uses:\n• Primary training objective proxy — minimize cross-entropy → minimize PPL\n• Comparing models on a held-out dataset (e.g., OpenWebText)\n• The CS336 leaderboard goal: minimize perplexity given a fixed compute budget (45 min on B200)"
      },
      {
        topic: "Alignment",
        q: "What is the weak supervision loop in alignment, and what are the three main RL-based alignment algorithms?",
        a: "Weak supervision: it's easier to critique a response than generate one. Loop: generate → score (human/LM judge) → update toward better responses.\n\nThree algorithms:\n• PPO — RL-based, stable but complex\n• DPO — simpler, works on preference pairs, no value function\n• GRPO — removes value function, used in DeepSeek-R1"
      }
    ]
  }
  // ── ADD FUTURE LECTURES HERE ──
  // { id: 2, title: "Resource Accounting", cards: [ ... ] },
];

//  SUPPORTING MATERIALS — add new entries below

const MATERIALS = [
  // ── Lecture 1 ──
  {
    lecId: 1,
    group: "Course",
    icon: "🌐",
    title: "CS336 Course Website",
    desc: "Syllabus, lecture notes, assignments, and all course materials.",

  {

    group: "Course",
    icon: "▶️",

    desc: "Full video recordings from the previous offering of CS336.",
    url: "https://www.youtube.com/playlist?list=PLoROMvodv4rOY23Y-FGSjbpn7vTn3G0L8"

    group: "Assignment",

    desc: "Implement BPE tokenizer, Transformer, cross-entropy loss, AdamW optimizer, and training loop. Train on TinyStories and OpenWebText.",

  },
  {

  {

    group: "Key Papers",

  },

  },
  {

    group: "Key Papers",

    title: "Training Compute-Optimal Large Language Models — Hoffmann+ 2022",
    desc: "The 'Chinchilla' paper: D ≈ 20N is compute-optimal (train on 20× more tokens than parameters).",
    url: "https://arxiv.org/abs/2203.15556"
  },
  {
    lecId: 1,
    group: "Key Papers",
    icon: "📄",
    title: "Language Models are Few-Shot Learners — Brown+ 2020",
    desc: "GPT-3 paper introducing in-context learning at scale.",
    url: "https://arxiv.org/abs/2005.14165"
  },
  {

    icon: "📚",
    title: "How to Scale Your Model (Google)",
    desc: "Recommended book for Assignment 2 (Systems). Covers TPUs but high-level concepts apply broadly.",

  },
  // ── ADD FUTURE LECTURE MATERIALS HERE ──

];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let activeLecture = 0; // 0 = All
let allCards = [];
let filteredCards = [];
let order = [];
let current = 0;
let flipped = false;

// Build flat card list annotated with lecture id
function buildAllCards() {
  allCards = [];
  LECTURES.forEach(lec => {
    lec.cards.forEach(c => allCards.push({ ...c, lecId: lec.id, lecTitle: lec.title }));
  });
}

function applyFilter() {
  filteredCards = activeLecture === 0
    ? allCards
    : allCards.filter(c => c.lecId === activeLecture);
  order = filteredCards.map((_, i) => i);
  current = 0;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
}

// ─────────────────────────────────────────────
//  UI helpers
// ─────────────────────────────────────────────
function render() {
  if (filteredCards.length === 0) {
    document.getElementById('question-text').textContent = 'No cards in this filter.';
    document.getElementById('answer-text').innerHTML = '';
    document.getElementById('card-lec-label').textContent = '';
    document.getElementById('progress-label').textContent = '—';
    document.getElementById('bar').style.width = '0%';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }
  const idx = order[current];
  const c = filteredCards[idx];
  document.getElementById('question-text').textContent = c.q;
  document.getElementById('answer-text').innerHTML = c.a.replace(/\n/g, '<br>');
  document.getElementById('card-lec-label').textContent = `Lecture ${c.lecId} · ${c.topic}`;
  document.getElementById('progress-label').textContent =
    `Card ${current + 1} of ${filteredCards.length}`;
  document.getElementById('bar').style.width =
    `${((current + 1) / filteredCards.length) * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === filteredCards.length - 1;
}

function renderLectureBar() {
  const bar = document.getElementById('lecture-bar');
  bar.innerHTML = '';
  // All button
  const all = document.createElement('button');
  all.className = 'lec-btn' + (activeLecture === 0 ? ' active' : '');
  all.textContent = `All (${allCards.length})`;
  all.onclick = () => { activeLecture = 0; applyFilter(); render(); renderLectureBar(); updateStats(); renderMaterials(); };
  bar.appendChild(all);
  // Per-lecture buttons
  for (let i = 1; i <= 17; i++) {
    const lec = LECTURES.find(l => l.id === i);
    const btn = document.createElement('button');
    if (lec) {
      btn.className = 'lec-btn' + (activeLecture === i ? ' active' : '');
      btn.textContent = `L${i} (${lec.cards.length})`;
      btn.onclick = () => { activeLecture = i; applyFilter(); render(); renderLectureBar(); updateStats(); renderMaterials(); };
    } else {
      btn.className = 'lec-btn locked';
      btn.textContent = `L${i}`;
    }
    bar.appendChild(btn);
  }
}

function renderLecGrid() {
  const grid = document.getElementById('lec-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= 17; i++) {
    const lec = LECTURES.find(l => l.id === i);
    const el = document.createElement('div');
    el.className = 'lec-card' + (lec ? ' done' : '');
    el.innerHTML = `<div class="lc-num">Lecture ${i}</div>
      <div class="lc-title">${lec ? lec.title : 'Coming soon'}</div>
      <div class="lc-count">${lec ? lec.cards.length + ' cards' : '—'}</div>`;
    grid.appendChild(el);
  }
}

function updateStats() {
  document.getElementById('stat-showing').textContent = filteredCards.length;
  document.getElementById('stat-total').textContent = allCards.length;
  document.getElementById('stat-lecs').textContent = LECTURES.length;
}

function renderMaterials() {
  const body = document.getElementById('materials-body');
  const filtered = activeLecture === 0
    ? MATERIALS
    : MATERIALS.filter(m => m.lecId === activeLecture);

  if (filtered.length === 0) {
    body.innerHTML = '<p style="font-size:0.8rem;color:#334155;">No materials available for this lecture yet.</p>';
    return;
  }

  // Group by group label
  const groups = {};
  filtered.forEach(m => {
    if (!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(m);
  });

  body.innerHTML = Object.entries(groups).map(([groupName, items]) => `
    <div class="mat-group">
      <div class="mat-group-label">${groupName}</div>
      ${items.map(m => `
        <a class="mat-item" href="${m.url}" target="_blank" rel="noopener">
          <span class="mat-icon">${m.icon}</span>
          <div class="mat-body">
            <span class="mat-title">${m.title}</span>
            <span class="mat-desc">${m.desc}</span>
            ${activeLecture === 0 ? `<span class="mat-lec-tag">Lecture ${m.lecId}</span>` : ''}
          </div>
        </a>
      `).join('')}
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
//  Actions
// ─────────────────────────────────────────────
function flipCard() {
  flipped = !flipped;
  document.getElementById('card').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= filteredCards.length) return;
  current = next;
  flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function shuffle() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  current = 0; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

function resetOrder() {
  order = filteredCards.map((_, i) => i);
  current = 0; flipped = false;
  document.getElementById('card').classList.remove('flipped');
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
buildAllCards();
applyFilter();
render();
renderLectureBar();
renderLecGrid();
updateStats();
renderMaterials();
</script>
</body>
</html>
